# iii engine config for the local docker-compose stack. Trimmed from
# sdk/fixtures/config-test.yaml: worker-manager + state + queue + http + cron +
# pubsub. State is file-backed under /data (a mounted volume) so it survives
# container restarts.
workers:
  - name: iii-worker-manager
    config:
      host: 0.0.0.0
      port: 49134

  - name: iii-state
    config:
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: /data/state_store.db

  - name: iii-queue
    config:
      queue_configs:
        default:
          max_retries: 3
          concurrency: 5
          type: standard
      adapter:
        name: builtin

  - name: iii-http
    config:
      host: 0.0.0.0
      port: 3111
      default_timeout: 30000

  - name: iii-pubsub
    config:
      adapter:
        name: local

  - name: iii-cron
    config:
      adapter:
        name: kv
