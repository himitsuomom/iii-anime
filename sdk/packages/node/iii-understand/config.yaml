# Minimal engine config to run the understand worker locally.
# The worker only needs the HTTP module to expose its GET surface.
workers:
  - name: iii-http
    config:
      port: 3111
      host: 127.0.0.1
      default_timeout: 30000
      concurrency_request_limit: 1024
      cors:
        allowed_origins:
          - "*"
        allowed_methods:
          - GET
