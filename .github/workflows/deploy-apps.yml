# Deploy the resale apps (apps/ec worker + apps/automation-studio) as container
# images. SKELETON: manual-trigger only (workflow_dispatch), and gated so it is
# inert until the required AWS infra + secrets/vars exist. It mirrors the OIDC
# auth pattern of deploy-website.yml and the buildx push of docker-engine.yml.
#
# Prerequisites before enabling (not provisioned here):
#   - An IAM role for GitHub OIDC (see infra/terraform/website/iam_github_oidc.tf
#     for the trust pattern) → secret AWS_DEPLOY_ROLE_ARN
#   - ECR repositories: iii-ec-worker, iii-automation-studio → vars.ECR_REGISTRY
#   - A runtime target (ECS service / App Runner / k8s) for the deploy step below
name: Deploy Apps

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (default: current ref)'
        required: false
        type: string
      image_tag:
        description: 'Image tag (default: short SHA)'
        required: false
        type: string

concurrency:
  group: deploy-apps
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for AWS OIDC

jobs:
  build-and-push:
    name: Build & push ${{ matrix.app.name }}
    runs-on: ubuntu-latest
    environment: iii-apps-prod
    timeout-minutes: 30
    # secrets can't be used in `if:`, so map presence to an env var and gate the
    # AWS/build steps on it — the skeleton no-ops (green) until the OIDC role
    # secret is configured, instead of failing red.
    env:
      AWS_REGION: us-east-1
      HAVE_AWS: ${{ secrets.AWS_DEPLOY_ROLE_ARN != '' }}
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: ec-worker
            dockerfile: apps/ec/Dockerfile
            repo: iii-ec-worker
          - name: automation-studio
            dockerfile: apps/automation-studio/Dockerfile
            repo: iii-automation-studio
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Skip notice (AWS OIDC not configured)
        if: env.HAVE_AWS != 'true'
        run: echo "::notice::deploy-apps skipped — set AWS_DEPLOY_ROLE_ARN (+ ECR_REGISTRY) to enable."

      - name: Configure AWS credentials (GitHub OIDC)
        if: env.HAVE_AWS == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: env.HAVE_AWS == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3
        if: env.HAVE_AWS == 'true'

      - name: Resolve image tag
        if: env.HAVE_AWS == 'true'
        id: tag
        run: echo "tag=${{ inputs.image_tag || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build & push image
        if: env.HAVE_AWS == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.app.dockerfile }}
          push: true
          tags: |
            ${{ vars.ECR_REGISTRY }}/${{ matrix.app.repo }}:${{ steps.tag.outputs.tag }}
            ${{ vars.ECR_REGISTRY }}/${{ matrix.app.repo }}:latest
          provenance: false

      # Deploy step is intentionally a no-op placeholder. Wire it to your runtime
      # (e.g. `aws ecs update-service --force-new-deployment`, App Runner, or a
      # kubectl/helm rollout) once the target exists.
      - name: Deploy (placeholder)
        if: env.HAVE_AWS == 'true'
        run: |
          echo "::notice::Built and pushed ${{ matrix.app.repo }}:${{ steps.tag.outputs.tag }}."
          echo "Add a runtime rollout here (ECS/App Runner/k8s) to complete the deploy."
