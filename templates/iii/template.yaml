# Root template manifest for the iii template store.
#
# Holds two kinds of templates, both intent-orchestrated:
#   - Docker Compose stacks (scripts/import-compose-templates.py)
#   - Reference / knowledge packs from awesome-lists
#     (scripts/import-awesome-lists.py)
#
#   iii project init --template <name> --template-dir templates/iii
#   iii project init --intent "..."     --template-dir templates/iii
#
templates:
  - awesome
  - awesome-android-ui
  - awesome-cpp
  - awesome-design-patterns
  - awesome-flutter
  - awesome-go
  - awesome-hacking
  - awesome-ios
  - awesome-java
  - awesome-mac
  - awesome-nodejs
  - awesome-python
  - awesome-react
  - awesome-react-components
  - awesome-scalability
  - awesome-selfhosted
  - book-of-secret-knowledge
  - django
  - fastapi
  - flask
  - flask-redis
  - github-cheat-sheet
  - hellogithub
  - nginx-flask-mysql
  - nginx-golang
  - nginx-golang-postgres
  - nginx-nodejs-redis
  - open-source-ios-apps
  - open-source-mac-os-apps
  - papers-we-love
  - postgresql-pgadmin
  - prometheus-grafana
  - spring-postgres
  - wordpress-mysql

# Root-level language file patterns. Per-template manifests override
# these with `common: ['*']`.
language_files:
  common:
    - 'compose.yaml'
    - 'compose.yml'
    - 'docker-compose.yml'
    - 'docker-compose.*.yml'
    - 'Dockerfile'
    - '*.conf'
    - 'README.md'
    - 'README*'
    - 'RESOURCES.md'
    - 'index.yaml'
    - 'LICENSE'
    - '.env'
    - '.env.*'
    - '.gitignore'
    - '.dockerignore'
