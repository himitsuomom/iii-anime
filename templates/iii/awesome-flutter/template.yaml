name: "Awesome Flutter"
description: "Flutter resources, packages, components, and apps"
version: "0.1.0"
min_iii_version: "0.11.0"

# Reference / knowledge-pack template: docs-only, language-agnostic.
treat_required_as_included: true
requires: []
optional: []

# Copy every bundled file regardless of language selection.
language_files:
  common:
    - '*'

# Selection metadata for intent-based orchestration.
# 使用する場面 / 使用条件. Tagged kind:reference (no Docker, no stack).
selection:
  use_cases:
    - "Flutter resources, packages, components, and apps"
    - "Find curated Awesome Flutter resources, libraries, and tools"
    - "Reference list / knowledge pack for Awesome Flutter"
  tags:
    - "kind:reference"
    - "awesome"
    - "docs"
    - "framework:flutter"
    - "lang:dart"
    - "topic:mobile"
  keywords:
    - "flutter"
    - "dart"
    - "mobile"
    - "cross-platform"
    - "widgets"
    - "awesome"
    - "articles"
    - "advanced"
    - "graphics"
    - "rendering"
    - "videos"
    - "components"
    - "templates"
    - "plugins"
    - "frameworks"
    - "experimental"
    - "engines"
    - "open"
    - "source"
    - "apps"
    - "utilities"
    - "podcasts"
    - "bonus"
    - "community"
  conditions:
    requires_docker: false
    services: []
    notes:
      - "Source: https://github.com/Solido/awesome-flutter"
      - "License: See source repository"
      - "Curated link list — snapshot of the upstream README."

files:
  - "RESOURCES.md"
  - "index.yaml"

next_steps:
  - "Browse the curated list in RESOURCES.md"
  - "See index.yaml for the categories it covers"
  - "Source: https://github.com/Solido/awesome-flutter"
