name: "Awesome Go"
description: "Curated Go frameworks, libraries, and software"
version: "0.1.0"
min_iii_version: "0.11.0"

# Reference / knowledge-pack template: docs-only, language-agnostic.
treat_required_as_included: true
requires: []
optional: []

# Copy every bundled file regardless of language selection.
language_files:
  common:
    - '*'

# Selection metadata for intent-based orchestration.
# 使用する場面 / 使用条件. Tagged kind:reference (no Docker, no stack).
selection:
  use_cases:
    - "Curated Go frameworks, libraries, and software"
    - "Find curated Awesome Go resources, libraries, and tools"
    - "Reference list / knowledge pack for Awesome Go"
  tags:
    - "kind:reference"
    - "awesome"
    - "docs"
    - "lang:go"
    - "topic:libraries"
  keywords:
    - "go"
    - "golang"
    - "microservices"
    - "cli"
    - "web"
    - "backend"
    - "awesome"
    - "actor"
    - "model"
    - "artificial"
    - "intelligence"
    - "audio"
    - "and"
    - "music"
    - "authentication"
    - "authorization"
    - "blockchain"
    - "bot"
    - "building"
    - "build"
    - "automation"
    - "command"
    - "line"
    - "configuration"
    - "continuous"
    - "integration"
    - "css"
    - "preprocessors"
    - "data"
    - "frameworks"
    - "structures"
    - "algorithms"
  conditions:
    requires_docker: false
    services: []
    notes:
      - "Source: https://github.com/avelino/awesome-go"
      - "License: MIT"
      - "Curated link list — snapshot of the upstream README."

files:
  - "RESOURCES.md"
  - "index.yaml"

next_steps:
  - "Browse the curated list in RESOURCES.md"
  - "See index.yaml for the categories it covers"
  - "Source: https://github.com/avelino/awesome-go"
