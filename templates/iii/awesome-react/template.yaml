name: "Awesome React"
description: "React ecosystem: tutorials, tools, and resources"
version: "0.1.0"
min_iii_version: "0.11.0"

# Reference / knowledge-pack template: docs-only, language-agnostic.
treat_required_as_included: true
requires: []
optional: []

# Copy every bundled file regardless of language selection.
language_files:
  common:
    - '*'

# Selection metadata for intent-based orchestration.
# 使用する場面 / 使用条件. Tagged kind:reference (no Docker, no stack).
selection:
  use_cases:
    - "React ecosystem: tutorials, tools, and resources"
    - "Find curated Awesome React resources, libraries, and tools"
    - "Reference list / knowledge pack for Awesome React"
  tags:
    - "kind:reference"
    - "awesome"
    - "docs"
    - "lang:javascript"
    - "framework:react"
    - "topic:frontend"
  keywords:
    - "react"
    - "javascript"
    - "frontend"
    - "hooks"
    - "redux"
    - "ecosystem"
    - "awesome"
    - "native"
  conditions:
    requires_docker: false
    services: []
    notes:
      - "Source: https://github.com/enaqx/awesome-react"
      - "License: See source repository"
      - "Curated link list — snapshot of the upstream README."

files:
  - "RESOURCES.md"
  - "index.yaml"

next_steps:
  - "Browse the curated list in RESOURCES.md"
  - "See index.yaml for the categories it covers"
  - "Source: https://github.com/enaqx/awesome-react"
