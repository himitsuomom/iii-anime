name: "Awesome C++"
description: "Curated C++ frameworks, libraries, and resources"
version: "0.1.0"
min_iii_version: "0.11.0"

# Reference / knowledge-pack template: docs-only, language-agnostic.
treat_required_as_included: true
requires: []
optional: []

# Copy every bundled file regardless of language selection.
language_files:
  common:
    - '*'

# Selection metadata for intent-based orchestration.
# 使用する場面 / 使用条件. Tagged kind:reference (no Docker, no stack).
selection:
  use_cases:
    - "Curated C++ frameworks, libraries, and resources"
    - "Find curated Awesome C++ resources, libraries, and tools"
    - "Reference list / knowledge pack for Awesome C++"
  tags:
    - "kind:reference"
    - "awesome"
    - "docs"
    - "lang:cpp"
    - "topic:libraries"
  keywords:
    - "cpp"
    - "c++"
    - "libraries"
    - "frameworks"
    - "systems"
    - "awesome"
    - "standard"
    - "artificial"
    - "intelligence"
    - "asynchronous"
    - "event"
    - "loop"
    - "audio"
    - "biology"
    - "bittorrent"
    - "chemistry"
    - "cli"
    - "compression"
    - "concurrency"
    - "configuration"
    - "containers"
    - "cryptography"
    - "csv"
    - "database"
    - "data"
    - "visualization"
    - "debug"
    - "documentation"
    - "dsp"
  conditions:
    requires_docker: false
    services: []
    notes:
      - "Source: https://github.com/fffaraz/awesome-cpp"
      - "License: MIT"
      - "Curated link list — snapshot of the upstream README."

files:
  - "RESOURCES.md"
  - "index.yaml"

next_steps:
  - "Browse the curated list in RESOURCES.md"
  - "See index.yaml for the categories it covers"
