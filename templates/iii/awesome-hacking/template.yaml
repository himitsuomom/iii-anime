name: "Awesome Hacking"
description: "Curated hacking, pentest, and offensive security resources"
version: "0.1.0"
min_iii_version: "0.11.0"

# Reference / knowledge-pack template: docs-only, language-agnostic.
treat_required_as_included: true
requires: []
optional: []

# Copy every bundled file regardless of language selection.
language_files:
  common:
    - '*'

# Selection metadata for intent-based orchestration.
# 使用する場面 / 使用条件. Tagged kind:reference (no Docker, no stack).
selection:
  use_cases:
    - "Curated hacking, pentest, and offensive security resources"
    - "Find curated Awesome Hacking resources, libraries, and tools"
    - "Reference list / knowledge pack for Awesome Hacking"
  tags:
    - "kind:reference"
    - "awesome"
    - "docs"
    - "topic:security"
    - "topic:hacking"
  keywords:
    - "hacking"
    - "pentest"
    - "security"
    - "ctf"
    - "exploit"
    - "redteam"
    - "osint"
    - "awesome"
    - "repositories"
    - "other"
    - "useful"
    - "need"
    - "more"
    - "contributions"
  conditions:
    requires_docker: false
    services: []
    notes:
      - "Source: https://github.com/Hack-with-Github/Awesome-Hacking"
      - "License: CC0-1.0"
      - "Curated link list — snapshot of the upstream README."

files:
  - "RESOURCES.md"
  - "index.yaml"

next_steps:
  - "Browse the curated list in RESOURCES.md"
  - "See index.yaml for the categories it covers"
  - "Source: https://github.com/Hack-with-Github/Awesome-Hacking"
