name: "Papers We Love"
description: "Academic computer science papers worth reading"
version: "0.1.0"
min_iii_version: "0.11.0"

# Reference / knowledge-pack template: docs-only, language-agnostic.
treat_required_as_included: true
requires: []
optional: []

# Copy every bundled file regardless of language selection.
language_files:
  common:
    - '*'

# Selection metadata for intent-based orchestration.
# 使用する場面 / 使用条件. Tagged kind:reference (no Docker, no stack).
selection:
  use_cases:
    - "Academic computer science papers worth reading"
    - "Find curated Papers We Love resources, libraries, and tools"
    - "Reference list / knowledge pack for Papers We Love"
  tags:
    - "kind:reference"
    - "awesome"
    - "docs"
    - "topic:papers"
    - "topic:computer-science"
  keywords:
    - "papers"
    - "research"
    - "academic"
    - "algorithms"
    - "distributed-systems"
    - "we"
    - "love"
    - "info"
    - "contributing"
    - "guidelines"
    - "copyright"
  conditions:
    requires_docker: false
    services: []
    notes:
      - "Source: https://github.com/papers-we-love/papers-we-love"
      - "License: See source repository"
      - "Curated link list — snapshot of the upstream README."

files:
  - "RESOURCES.md"
  - "index.yaml"

next_steps:
  - "Browse the curated list in RESOURCES.md"
  - "See index.yaml for the categories it covers"
  - "Source: https://github.com/papers-we-love/papers-we-love"
