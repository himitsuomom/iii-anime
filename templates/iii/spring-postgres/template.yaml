name: "Spring / PostgreSQL"
description: "Sample Java application with Spring framework and a Postgres database."
version: "0.1.0"
min_iii_version: "0.11.0"

# Compose samples are language-agnostic from the scaffolder's point of
# view: the Dockerfiles own the per-language build. No language gating.
treat_required_as_included: true
requires: []
optional: []

# Mark every bundled file as 'common' so the scaffolder copies the whole
# stack regardless of which languages the user selects.
language_files:
  common:
    - '*'

# Selection metadata: drives intent-based orchestration
# (`iii project init --intent "..."`). 使用する場面 / 使用条件.
selection:
  use_cases:
    - "Sample Java application with Spring framework and a Postgres database"
    - "Spring / PostgreSQL stack via Docker Compose"
  tags:
    - "web"
    - "api"
    - "lang:java"
    - "framework:spring"
    - "db:postgres"
    - "database"
  keywords:
    - "spring"
    - "java"
    - "springboot"
    - "postgres"
    - "postgresql"
    - "sql"
    - "relational"
  conditions:
    requires_docker: true
    services:
      - "postgres"
    notes:
      - "Intended for local development; not production-ready as-is."

files:
  - "README.md"
  - "backend/Dockerfile"
  - "backend/pom.xml"
  - "backend/src/main/java/com/company/project/Application.java"
  - "backend/src/main/java/com/company/project/controllers/HomeController.java"
  - "backend/src/main/java/com/company/project/entity/Greeting.java"
  - "backend/src/main/java/com/company/project/repository/GreetingRepository.java"
  - "backend/src/main/resources/application.properties"
  - "backend/src/main/resources/data.sql"
  - "backend/src/main/resources/schema.sql"
  - "backend/src/main/resources/templates/home.ftlh"
  - "compose.yaml"
  - "db/password.txt"

next_steps:
  - "Start the stack: docker compose up"
  - "Stop and remove it: docker compose down"
