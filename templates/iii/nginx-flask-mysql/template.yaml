name: "NGINX / Flask / MySQL"
description: "Sample Python/Flask application with an Nginx proxy and a MySQL database."
version: "0.1.0"
min_iii_version: "0.11.0"

# Compose samples are language-agnostic from the scaffolder's point of
# view: the Dockerfiles own the per-language build. No language gating.
treat_required_as_included: true
requires: []
optional: []

# Mark every bundled file as 'common' so the scaffolder copies the whole
# stack regardless of which languages the user selects.
language_files:
  common:
    - '*'

# Selection metadata: drives intent-based orchestration
# (`iii project init --intent "..."`). 使用する場面 / 使用条件.
selection:
  use_cases:
    - "Sample Python/Flask application with an Nginx proxy and a MySQL database"
    - "NGINX / Flask / MySQL stack via Docker Compose"
  tags:
    - "web"
    - "proxy:nginx"
    - "api"
    - "lang:python"
    - "framework:flask"
    - "db:mysql"
    - "database"
  keywords:
    - "nginx"
    - "reverse-proxy"
    - "proxy"
    - "flask"
    - "python"
    - "rest"
    - "mysql"
    - "sql"
    - "relational"
  conditions:
    requires_docker: true
    services:
      - "mysql"
    notes:
      - "Intended for local development; not production-ready as-is."

files:
  - "README.md"
  - "backend/Dockerfile"
  - "backend/hello.py"
  - "backend/requirements.txt"
  - "compose.yaml"
  - "db/password.txt"
  - "proxy/Dockerfile"
  - "proxy/conf"

next_steps:
  - "Start the stack: docker compose up"
  - "Stop and remove it: docker compose down"
